spring.application.name=duenos
server.port=8080

servicios.mascotas.url=http://localhost:8082

spring.datasource.url=jdbc:mysql://localhost:3306/db_veterinaria_duenos?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

eureka.client.fetch-registry=false
eureka.client.register-with-eureka=false

spring.flyway.enabled=false