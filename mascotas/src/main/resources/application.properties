spring.application.name=mascotas

server.port=8082
spring.datasource.url=jdbc:mysql://localhost:3306/db_veterinaria_mascotas?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true

servicios.duenos.url=http://localhost:8080

spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

eureka.client.fetch-registry=false
eureka.client.register-with-eureka=false

spring.flyway.enabled=false

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html