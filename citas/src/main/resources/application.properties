spring.application.name=servicio-citas

server.port=8085
servicios.mascotas.url=http://localhost:8082
servicios.duenos.url=http://localhost:8080
servicios.veterinarios.url=http://localhost:8087


spring.datasource.url=jdbc:mysql://localhost:3306/db_veterinaria_citas?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

eureka.client.fetch-registry=false
eureka.client.register-with-eureka=false

spring.flyway.enabled=false

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html