spring.application.name=boleta


server.port=8089
servicios.citas.url=http://localhost:8085
servicios.pagos.url=http://localhost:8088

spring.datasource.url=jdbc:mysql://localhost:3306/db_veterinaria_boletas?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root

spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect


eureka.client.fetch-registry=false
eureka.client.register-with-eureka=false

spring.flyway.enabled=false